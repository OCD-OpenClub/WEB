        // --- COMPONENTE CAROUSEL ---
        const ScrollCarousel = () => {
            const [activeSlide, setActiveSlide] = useState(0);
            const containerRef = useRef(null);

            const slides = [
                { 
                    id: 1, 
                    title: "DIGITAL INFRASTRUCTURE", 
                    sub: "ASSET CREATION", 
                    desc: "No fotografiamos productos, los clonamos. Creamos gemelos digitales (Digital Twins) con texturas 8K listos para cualquier entorno.", 
                    img: "image_54974c.png", 
                    fallback: "https://images.unsplash.com/photo-1633412802994-5c058f151b66?q=80&w=2070&auto=format&fit=crop" 
                },
                { 
                    id: 2, 
                    title: "VIRTUAL PRODUCTION", 
                    sub: "INFINITE STUDIO", 
                    desc: "Un estudio sin límites físicos. Cambia la iluminación, el clima o la ubicación de tu campaña con un solo clic. Cero huella de carbono.", 
                    img: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop" 
                },
                { 
                    id: 3, 
                    title: "GENERATIVE EDITORIAL", 
                    sub: "AI DIRECTION", 
                    desc: "Dirección de arte generativa para crear variaciones masivas de campaña, personalizadas para cada segmento de tu audiencia.", 
                    img: "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974&auto=format&fit=crop" 
                }
            ];

            useEffect(() => {
                const handleScroll = () => {
                    if (!containerRef.current) return;
                    const { top, height } = containerRef.current.getBoundingClientRect();
                    const scrollProgress = -top / (height - window.innerHeight);
                    if (scrollProgress < 0.3) setActiveSlide(0);
                    else if (scrollProgress < 0.6) setActiveSlide(1);
                    else setActiveSlide(2);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div ref={containerRef} className="h-[250vh] relative bg-brand-silver">
                    <div className="sticky top-0 h-screen overflow-hidden flex items-center justify-center bg-[#E5E5E5]">
                        {slides.map((slide, index) => (
                            <div key={slide.id} className={`absolute inset-0 transition-opacity duration-700 ease-out ${activeSlide === index ? 'opacity-100' : 'opacity-0'}`}>
                                <img src={slide.img} alt={slide.title} className="w-full h-full object-cover filter grayscale-[20%]" onError={(e) => { if(slide.fallback) e.target.src = slide.fallback; }} />
                                <div className="absolute inset-0 bg-gradient-to-r from-black/60 via-transparent to-transparent"></div>
                            </div>
                        ))}
                        <div className="relative z-10 max-w-7xl w-full px-6 grid grid-cols-1 md:grid-cols-2">
                            <div className="md:col-span-1">
                                <div className="glass-panel p-8 md:p-12 rounded-3xl border-l-4 border-brand-green shadow-2xl backdrop-blur-xl">
                                    <div className="flex items-center gap-3 mb-4">
                                        <span className="font-mono text-xs font-bold text-zinc-500 uppercase tracking-widest">SYSTEM 0{activeSlide + 1}</span>
                                        <div className="h-px w-12 bg-zinc-400"></div>
                                        <span className="font-mono text-xs font-bold text-brand-greenDark uppercase tracking-widest">{slides[activeSlide].sub}</span>
                                    </div>
                                    <h2 className="text-4xl md:text-6xl font-black mb-6 tracking-tighter leading-[0.9] text-zinc-900">{slides[activeSlide].title}</h2>
                                    <p className="text-zinc-800 text-sm md:text-base leading-relaxed font-medium">{slides[activeSlide].desc}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MODEL CARD ---
        const ModelCard = ({ model, onClick }) => (
            <div 
                className="group relative aspect-[3/4] bg-white overflow-hidden border border-zinc-200 hover:border-brand-green transition-all duration-300 cursor-pointer"

        );

        // --- MODEL DETAIL MODAL (CON NAVEGACIÓN COMPLETA) ---
        const ModelDetailModal = ({ model, onClose, onNext, onPrev }) => {
            const [lightboxIndex, setLightboxIndex] = useState(null);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    // Si el lightbox está abierto, navegamos fotos
                    if (lightboxIndex !== null) {
                        if (e.key === 'Escape') setLightboxIndex(null);
                        if (e.key === 'ArrowRight') nextImage();
                        if (e.key === 'ArrowLeft') prevImage();
                    } else {
                        // Si el lightbox está CERRADO, navegamos MODELOS
                        if (e.key === 'Escape') onClose();
                        if (e.key === 'ArrowRight') onNext();
                        if (e.key === 'ArrowLeft') onPrev();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [lightboxIndex, onClose, onNext, onPrev]);

            if (!model) return null;

            // Funciones para Lightbox
            const nextImage = (e) => {
                if (e) e.stopPropagation();
                setLightboxIndex((prev) => (prev + 1) % model.gallery.length);
            };
            const prevImage = (e) => {
                if (e) e.stopPropagation();
                setLightboxIndex((prev) => (prev - 1 + model.gallery.length) % model.gallery.length);
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm animate-fade-in" onClick={onClose}></div>
                    
                    {/* BOTONES DE NAVEGACIÓN DE MODELOS (FLECHAS LATERALES) */}
                    <button 
                        onClick={(e) => { e.stopPropagation(); onPrev(); }} 
                        className="absolute left-4 top-1/2 -translate-y-1/2 z-20 bg-white/10 hover:bg-white text-white hover:text-black p-4 rounded-full backdrop-blur-md border border-white/20 transition-all hidden md:flex"
                    >
                        <ArrowLeft className="w-6 h-6" />
                    </button>
                    <button 
                        onClick={(e) => { e.stopPropagation(); onNext(); }} 
                        className="absolute right-4 top-1/2 -translate-y-1/2 z-20 bg-white/10 hover:bg-white text-white hover:text-black p-4 rounded-full backdrop-blur-md border border-white/20 transition-all hidden md:flex"
                    >
                        <ArrowRight className="w-6 h-6" />
                    </button>

                    <div className="relative bg-white w-full max-w-5xl h-[90vh] rounded-[2rem] overflow-hidden shadow-2xl flex flex-col md:flex-row animate-slide-up z-10">
                        <button onClick={onClose} className="absolute top-6 right-6 z-20 bg-white/50 hover:bg-white p-2 rounded-full backdrop-blur transition-colors">
                            <Close className="text-black w-6 h-6" />
                        </button>

                        <div className="w-full md:w-5/12 h-1/3 md:h-full relative bg-zinc-200">
                            {/* Key fuerza re-render al cambiar de modelo */}
                            <img 
                                key={model.code}
                                src={model.img} 
                                className="w-full h-full object-cover animate-fade-in" 
                                alt={model.name}
                                onError={(e) => { e.target.onerror = null; e.target.src = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1964&auto=format&fit=crop"; }}
                            />
                            <div className="absolute bottom-6 left-6">
                                <h2 className="text-6xl font-black text-white uppercase tracking-tighter leading-none drop-shadow-lg">{model.name}</h2>
                                <span className="text-brand-green font-mono text-sm font-bold bg-black/50 px-2 py-1 backdrop-blur">{model.code}</span>
                            </div>
                        </div>

                        <div className="w-full md:w-7/12 h-2/3 md:h-full bg-white p-8 md:p-12 overflow-y-auto hide-scroll flex flex-col">
                            
                            <div className="mb-10 flex justify-between items-start border-b border-zinc-100 pb-6">
                                <div>
                                    <span className="font-mono text-xs text-zinc-400 uppercase tracking-widest mb-1 block">Subject Profile</span>
                                    <p className="text-zinc-600 text-sm max-w-md leading-relaxed animate-fade-in">{model.bio}</p>
                                </div>
                                <div className="text-right hidden md:block">

                                    <span className="text-xs text-brand-green font-mono">AVAILABLE FOR LICENSING</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-4 mb-10">
                                <div className="bg-zinc-50 p-4 rounded-xl border border-zinc-100">
