<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCD - OPEN CLUB DEPARTMENT</title>
    
    <!-- 1. TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- 3. REACT Y BABEL -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 4. CONFIGURACIÓN -->
    <script>
        if (typeof tailwind !== 'undefined') {
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                green: '#00D64F', 
                                greenDark: '#009933', // Verde ajustado para legibilidad en fondos claros
                                silver: '#F3F4F6', 
                                lead: '#656568',   
                                dark: '#080808',   
                            }
                        },
                        fontFamily: {
                            sans: ['Inter', 'sans-serif'],
                            mono: ['Space Mono', 'monospace'],
                        },
                        animation: {
                            'scroll': 'scroll 20s linear infinite',
                        },
                        keyframes: {
                            scroll: {
                                '0%': { transform: 'translateX(0)' },
                                '100%': { transform: 'translateX(-100%)' },
                            }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #F8F9FA; 
            color: #080808; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }

        /* TEXTURA DE RUIDO (Noise) */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Glass Panel Moderno */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }
        
        .led-pulse { animation: soft-pulse 3s infinite; }
        @keyframes soft-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 #00D64F; }
            50% { opacity: 0.5; box-shadow: 0 0 6px #00D64F; }
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONOS ---
        const Icon = ({ children, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const MenuIcon = () => <Icon><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></Icon>;
        const Close = () => <Icon><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const ChevronDown = () => <Icon><polyline points="6 9 12 15 18 9"/></Icon>;
        const ArrowRight = () => <Icon><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>;
        const Terminal = () => <Icon><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></Icon>;

        // --- MARQUEE TECH STACK ---
        const TechMarquee = () => {
            const techs = ["UNREAL ENGINE 5", "METAHUMAN", "STABLE DIFFUSION", "NVIDIA OMNIVERSE", "CINEMA 4D", "OCTANE RENDER", "PYTHON SCRIPTING", "CUDA CORES"];
            return (
                <div className="w-full bg-brand-dark text-white py-3 overflow-hidden border-y border-zinc-800">
                    <div className="flex animate-scroll whitespace-nowrap">
                        {[...techs, ...techs, ...techs].map((tech, i) => (
                            <div key={i} className="flex items-center mx-8">
                                <div className="w-1.5 h-1.5 bg-brand-green rounded-full mr-3"></div>
                                <span className="font-mono text-xs tracking-widest font-bold">{tech}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- COMPONENTE CAROUSEL ---
        const ScrollCarousel = () => {
            const [activeSlide, setActiveSlide] = useState(0);
            const containerRef = useRef(null);

            const slides = [
                { 
                    id: 1, 
                    title: "DIGITAL INFRASTRUCTURE", 
                    sub: "ASSET CREATION", 
                    desc: "No fotografiamos productos, los clonamos. Creamos gemelos digitales (Digital Twins) con texturas 8K listos para cualquier entorno.", 
                    img: "image_54974c.png", 
                    fallback: "https://images.unsplash.com/photo-1633412802994-5c058f151b66?q=80&w=2070&auto=format&fit=crop" 
                },
                { 
                    id: 2, 
                    title: "VIRTUAL PRODUCTION", 
                    sub: "INFINITE STUDIO", 
                    desc: "Un estudio sin límites físicos. Cambia la iluminación, el clima o la ubicación de tu campaña con un solo clic. Cero huella de carbono.", 
                    img: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop" 
                },
                { 
                    id: 3, 
                    title: "GENERATIVE EDITORIAL", 
                    sub: "AI DIRECTION", 
                    desc: "Dirección de arte generativa para crear variaciones masivas de campaña, personalizadas para cada segmento de tu audiencia.", 
                    img: "https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974&auto=format&fit=crop" 
                }
            ];

            useEffect(() => {
                const handleScroll = () => {
                    if (!containerRef.current) return;
                    const { top, height } = containerRef.current.getBoundingClientRect();
                    const scrollProgress = -top / (height - window.innerHeight);
                    if (scrollProgress < 0.3) setActiveSlide(0);
                    else if (scrollProgress < 0.6) setActiveSlide(1);
                    else setActiveSlide(2);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div ref={containerRef} className="h-[250vh] relative bg-brand-silver">
                    <div className="sticky top-0 h-screen overflow-hidden flex items-center justify-center bg-[#E5E5E5]">
                        {slides.map((slide, index) => (
                            <div key={slide.id} className={`absolute inset-0 transition-opacity duration-700 ease-out ${activeSlide === index ? 'opacity-100' : 'opacity-0'}`}>
                                <img src={slide.img} alt={slide.title} className="w-full h-full object-cover filter grayscale-[20%]" onError={(e) => { if(slide.fallback) e.target.src = slide.fallback; }} />
                                <div className="absolute inset-0 bg-gradient-to-r from-black/60 via-transparent to-transparent"></div>
                            </div>
                        ))}
                        <div className="relative z-10 max-w-7xl w-full px-6 grid grid-cols-1 md:grid-cols-2">
                            <div className="md:col-span-1">
                                <div className="glass-panel p-8 md:p-12 rounded-3xl border-l-4 border-brand-green shadow-2xl backdrop-blur-xl">
                                    <div className="flex items-center gap-3 mb-4">
                                        <span className="font-mono text-xs font-bold text-zinc-500 uppercase tracking-widest">SYSTEM 0{activeSlide + 1}</span>
                                        <div className="h-px w-12 bg-zinc-400"></div>
                                        {/* TEXTO VERDE AJUSTADO (greenDark) */}
                                        <span className="font-mono text-xs font-bold text-brand-greenDark uppercase tracking-widest">{slides[activeSlide].sub}</span>
                                    </div>
                                    <h2 className="text-4xl md:text-6xl font-black mb-6 tracking-tighter leading-[0.9] text-zinc-900">{slides[activeSlide].title}</h2>
                                    <p className="text-zinc-800 text-sm md:text-base leading-relaxed font-medium">{slides[activeSlide].desc}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MODEL CARD ---
        const ModelCard = ({ name, code, img, type }) => (

                    src={img} 
                    alt={name} 
                    className="w-full h-full object-cover filter grayscale contrast-110 transition-all duration-500 group-hover:grayscale-0 group-hover:scale-105"

                        // Fallback genérico si la imagen específica falla
                        e.target.onerror = null; 
                        e.target.src = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1964&auto=format&fit=crop";

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {/* Box 1 */}

                            <div className="absolute top-0 right-0 w-24 h-24 bg-brand-silver rounded-bl-[4rem] -mr-4 -mt-4 transition-colors group-hover:bg-brand-green/10"></div>
                            
                            <div className="h-56 mb-8 relative rounded-2xl overflow-hidden shadow-inner">
                                <img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1974&auto=format&fit=crop" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                <div className="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors"></div>
                                <div className="absolute top-4 left-4 font-mono text-[10px] font-bold bg-white text-black px-3 py-1 rounded-full shadow-lg">9:16 VERTICAL</div>
                            </div>
                            <h3 className="font-black text-2xl mb-3 text-zinc-900 uppercase">SOCIAL CONTENT</h3>

                        </div>
                        
                        {/* Box 2 */}
                        <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-zinc-100 hover:shadow-2xl hover:border-brand-green/30 transition-all duration-500 group cursor-default relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-24 h-24 bg-brand-silver rounded-bl-[4rem] -mr-4 -mt-4 transition-colors group-hover:bg-brand-green/10"></div>
                            
                            <div className="h-56 mb-8 relative rounded-2xl overflow-hidden shadow-inner">
                                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=2015&auto=format&fit=crop" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                <div className="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors"></div>
                                <div className="absolute top-4 left-4 font-mono text-[10px] font-bold bg-white text-black px-3 py-1 rounded-full shadow-lg">WEB / SHOP</div>
                            </div>
                            <h3 className="font-black text-2xl mb-3 text-zinc-900 uppercase">E-COMMERCE</h3>
                            <p className="text-sm text-zinc-500 leading-relaxed font-medium">Fichas de producto con modelos consistentes. Reduce devoluciones mostrando tu producto en humanos digitales perfectos.</p>
                        </div>

                        {/* Box 3 */}
                        <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-zinc-100 hover:shadow-2xl hover:border-brand-green/30 transition-all duration-500 group cursor-default relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-24 h-24 bg-brand-silver rounded-bl-[4rem] -mr-4 -mt-4 transition-colors group-hover:bg-brand-green/10"></div>
                            
                            <div className="h-56 mb-8 relative rounded-2xl overflow-hidden shadow-inner">
                                <img src="https://images.unsplash.com/photo-1626785774583-ea261e963229?q=80&w=1974&auto=format&fit=crop" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                <div className="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors"></div>
                                <div className="absolute top-4 left-4 font-mono text-[10px] font-bold bg-white text-black px-3 py-1 rounded-full shadow-lg">HIGH RES</div>
                            </div>
                            <h3 className="font-black text-2xl mb-3 text-zinc-900 uppercase">GLOBAL CAMPAIGNS</h3>
                            <p className="text-sm text-zinc-500 leading-relaxed font-medium">Activos de ultra-alta resolución (8K) listos para impresión en gran formato, vallas publicitarias y revistas.</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- APP PRINCIPAL ---
        const OCDLanding = () => {
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [openFaqIndex, setOpenFaqIndex] = useState(null);

          const models = [
            // IMAGEN AEON ACTUALIZADA CON FALLBACK
            { name: "Aeon", code: "K-BTY-01", type: "K-BEAUTY", img: "https://raw.githubusercontent.com/OCD-OpenClub/WEB/refs/heads/main/images/AEON.jpeg" },
            { name: "Kai", code: "K-MALE-02", type: "STREET", img: "https://images.unsplash.com/photo-1552374196-c4e7ffc6e194?q=80&w=1974&auto=format&fit=crop" },
            { name: "Nova", code: "STR-F-01", type: "FASHION", img: "https://images.unsplash.com/photo-1611558709798-e009c8fd7706?q=80&w=1976&auto=format&fit=crop" },
            { name: "Zion", code: "STR-M-02", type: "SPORT", img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=1974&auto=format&fit=crop" },
            { name: "Lyra", code: "LUX-F-01", type: "LUXURY", img: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80&w=2550&auto=format&fit=crop" },
            { name: "Atlas", code: "LUX-M-02", type: "FORMAL", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1974&auto=format&fit=crop" },

          return (
            <div className="relative font-sans text-brand-dark selection:bg-brand-green selection:text-white">
              
              <div className="noise-overlay"></div>

              {/* NAV */}

                <div className="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 bg-black rounded-sm overflow-hidden flex items-center justify-center">
                        <span className="text-white font-bold text-xs">OCD</span>

                    Access Portal
                  </button>
                </div>
              </nav>

              {/* HERO */}
              <header id="hero" className="pt-32 pb-20 px-6 max-w-7xl mx-auto min-h-[90vh] flex flex-col justify-center">
                 <div className="border-t border-black mb-8 pt-4 flex justify-between items-start">
                    <div className="font-mono text-xs font-bold tracking-widest text-zinc-400">
                        EST. 2026 // SANTIAGO
                    </div>
                    <div className="flex items-center gap-2 px-3 py-1 bg-zinc-100 border border-zinc-200 rounded-full">
                        <div className="w-1.5 h-1.5 bg-brand-green rounded-full led-pulse"></div>
                        <span className="text-[10px] font-mono font-bold text-zinc-600">SYSTEM: ONLINE</span>
                    </div>
                 </div>

                 <div className="grid lg:grid-cols-12 gap-12 items-end">
                    <div className="lg:col-span-8">

                        </div>
                        <h1 className="text-6xl md:text-9xl font-black tracking-tighter leading-[0.85] mb-8">
                            OPEN CLUB <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-zinc-400 to-zinc-200">DEPARTMENT.</span>
                        </h1>
                        <p className="text-xl md:text-2xl font-light text-zinc-600 max-w-3xl leading-tight">
                            Talento sintético para marcas reales. Desbloquea un roster infinito de identidades sin las restricciones del mundo físico.
                        </p>
                    </div>
                    <div className="lg:col-span-4 flex flex-col items-start lg:items-end">
                        <div className="w-full aspect-square bg-zinc-200 relative overflow-hidden border border-zinc-300">
                             {/* FOTO HERO */}
                             <img 
                                src="image_5f1e4f.png" 
                                className="w-full h-full object-cover grayscale mix-blend-multiply opacity-80" 
                                onError={(e) => { e.target.style.display = 'none'; }}

                             <div className="absolute bottom-2 right-2 font-mono text-[10px]">FIG. 01</div>

                 </div>
              </header>

              {/* TECH STACK MARQUEE */}
              <TechMarquee />

              {/* CAROUSEL */}

              {/* OPEN ID (ROSTER) */}

                <div className="max-w-7xl mx-auto">
                    <div className="flex justify-between items-end mb-16 border-b border-black pb-4">
                        <h2 className="text-5xl font-black tracking-tighter">OPEN ID <span className="text-zinc-300">ROSTER</span></h2>
