                                '100%': { transform: 'scale(1)', opacity: '1' },
                            },
                            kenBurns: {
                                '0%': { transform: 'scale(1)' },
                                '100%': { transform: 'scale(1.1)' },
                            }
                        }
                    }
                }
            }

    <style>

        // --- DEPLOYMENT SECTION (REDISEÑADA FUTURISTA) ---
        const DeploymentSection = () => (
            <div className="py-24 px-6 bg-zinc-50 border-y border-zinc-200 relative overflow-hidden">
                {/* Tech Background Pattern */}

                <div className="max-w-7xl mx-auto relative z-10">

        // --- MODEL DETAIL MODAL ---
        const ModelDetailModal = ({ model, onClose, onNext, onPrev }) => {
            const [lightboxIndex, setLightboxIndex] = useState(null);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (lightboxIndex !== null) {
                        if (e.key === 'Escape') setLightboxIndex(null);
                        if (e.key === 'ArrowRight') nextImage();
                        if (e.key === 'ArrowLeft') prevImage();
                    } else {
                        if (e.key === 'Escape') onClose();
                        if (e.key === 'ArrowRight') onNext();
                        if (e.key === 'ArrowLeft') onPrev();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [lightboxIndex, onClose, onNext, onPrev]);

            if (!model) return null;

            const nextImage = (e) => { if(e) e.stopPropagation(); setLightboxIndex((prev) => (prev + 1) % model.gallery.length); };
            const prevImage = (e) => { if(e) e.stopPropagation(); setLightboxIndex((prev) => (prev - 1 + model.gallery.length) % model.gallery.length); };

            return (
