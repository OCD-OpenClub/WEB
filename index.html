<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCD - The Virtual Studio</title>
    
    <!-- TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- REACT Y BABEL -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#00D64F', // Verde Técnico (LED)
                            black: '#0a0a0a',
                            zinc: '#1f1f1f',
                            white: '#FFFFFF'
                        }
                    },
                    fontFamily: {
                        sans: ['Helvetica Neue', 'Arial', 'sans-serif'],
                        mono: ['Courier New', 'monospace'], // Fuente técnica
                    },
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(to right, #222 1px, transparent 1px), linear-gradient(to bottom, #222 1px, transparent 1px)"
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #f4f4f5; scroll-behavior: smooth; }
        .section-transition { transition: background-color 0.7s cubic-bezier(0.16, 1, 0.3, 1), color 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Efecto de parpadeo suave para el "LED" verde */
        @keyframes soft-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .led-pulse { animation: soft-pulse 3s infinite; }
        
        /* Grid de fondo sutil para el look "Blueprint" */
        .bg-tech-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS SVG (Líneas más finas para look Pro) ---
        const IconBase = ({ children, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className={className}>
                {children}
            </svg>
        );

        const Check = (props) => <IconBase {...props}><polyline points="20 6 9 17 4 12"/></IconBase>;
        const XIcon = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;
        const ArrowRight = (props) => <IconBase {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconBase>;
        const Menu = (props) => <IconBase {...props}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></IconBase>;
        const CloseIcon = (props) => <IconBase {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconBase>;
        const Cpu = (props) => <IconBase {...props}><rect x="4" y="4" width="16" height="16" rx="0" ry="0"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></IconBase>;
        const Aperture = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="14.31" y1="8" x2="20.05" y2="17.94"/><line x1="9.69" y1="8" x2="21.17" y2="8"/><line x1="7.38" y1="12" x2="13.12" y2="2.06"/><line x1="9.69" y1="16" x2="3.95" y2="6.06"/><line x1="14.31" y1="16" x2="2.83" y2="16"/><line x1="16.62" y1="12" x2="10.88" y2="21.94"/></IconBase>;
        const Layers = (props) => <IconBase {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></IconBase>;
        const Box = (props) => <IconBase {...props}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></IconBase>;
        const Zap = (props) => <IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconBase>;
        const Globe = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconBase>;
        const CornerDownRight = (props) => <IconBase {...props}><polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/></IconBase>;


        const OCDLanding = () => {
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [navTheme, setNavTheme] = useState('dark');

          const toggleMenu = () => setIsMenuOpen(!isMenuOpen);

          useEffect(() => {
            const handleScroll = () => {
                const systemSection = document.getElementById('system');
                if (!systemSection) return;
                const rect = systemSection.getBoundingClientRect();
                if (rect.top <= 80 && rect.bottom >= 80) {
                    setNavTheme('light');
                } else {
                    setNavTheme('dark');
                }
            };
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          // Estilos Nav
          const navBgClass = navTheme === 'light' ? 'bg-white/95 border-zinc-200' : 'bg-brand-black/90 border-zinc-900';
          const navTextClass = navTheme === 'light' ? 'text-black' : 'text-white';
          
          return (
            <div className="font-sans selection:bg-brand-green selection:text-black">
              
              {/* === NAVIGATION === */}
              <nav className={`fixed top-0 w-full z-50 backdrop-blur-md border-b transition-colors duration-500 ${navBgClass}`}>
                <div className="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    <div className="w-8 h-8 rounded-full overflow-hidden border border-zinc-700 grayscale hover:grayscale-0 transition-all">
                        <img src="image_5f1e4f.png" alt="OCD" className="w-full h-full object-cover" /> 
                    </div>
                    <span className={`text-lg font-bold tracking-tighter ${navTextClass}`}>OCD</span>
                    {/* Indicador de estado "Online" sutil */}
                    <div className="flex items-center gap-2 px-2 py-0.5 rounded-full bg-zinc-900/50 border border-zinc-800">
                        <div className="w-1.5 h-1.5 bg-brand-green rounded-full led-pulse"></div>
                        <span className="text-[10px] font-mono text-zinc-500 uppercase tracking-wider">System Active</span>
                    </div>
                  </div>
                  
                  <div className={`hidden md:flex space-x-10 text-xs font-mono tracking-widest ${navTheme === 'light' ? 'text-zinc-500' : 'text-zinc-500'}`}>
                    <a href="#hero" className="hover:text-brand-green transition-colors">MANIFESTO</a>
                    <a href="#filter" className="hover:text-brand-green transition-colors">THE FILTER</a>
                    <a href="#system" className="hover:text-brand-green transition-colors">THE SYSTEM</a>
                    <a href="#timeline" className="hover:text-brand-green transition-colors">TIMELINE</a>
                  </div>

                  <button className={`hidden md:block px-6 py-2 text-xs font-bold border transition-all ${navTheme === 'light' ? 'border-zinc-300 hover:border-black text-black' : 'border-zinc-700 hover:border-white text-white hover:bg-white/5'}`}>
                    DISCOVERY CALL
                  </button>

                  <button onClick={toggleMenu} className={`md:hidden ${navTextClass}`}>
                    {isMenuOpen ? <CloseIcon size={24} /> : <Menu size={24} />}
                  </button>
                </div>
                
                {isMenuOpen && (
                  <div className="md:hidden absolute w-full bg-brand-black border-b border-zinc-800 p-6 space-y-4 font-mono text-sm text-zinc-400">
                    <a href="#hero" onClick={toggleMenu} className="block hover:text-white">MANIFESTO</a>
                    <a href="#filter" onClick={toggleMenu} className="block hover:text-white">THE FILTER</a>
                    <a href="#system" onClick={toggleMenu} className="block hover:text-white">THE SYSTEM</a>
                    <a href="#timeline" onClick={toggleMenu} className="block hover:text-white">TIMELINE</a>
                  </div>
                )}
              </nav>

              {/* === HERO: HIGH TECH LAYOUT === */}
              <section id="hero" className="relative pt-32 pb-20 px-6 min-h-screen flex flex-col justify-center border-b border-zinc-900 bg-brand-black text-white bg-tech-grid">
                
                <div className="max-w-7xl mx-auto w-full grid lg:grid-cols-12 gap-12 items-center">
                    
                    {/* Columna Texto (Izquierda) */}
                    <div className="lg:col-span-7 relative z-10">
                        <div className="inline-flex items-center gap-3 mb-8 border-b border-brand-green/30 pb-2 pr-4">
                            <span className="font-mono text-xs text-brand-green tracking-widest uppercase">Visual Systems v.2.0</span>
                        </div>
                        
                        <h1 className="text-6xl md:text-8xl font-bold tracking-tighter mb-8 leading-[0.9]">
                            OPEN CLUB <br />
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-white to-zinc-500">DESIGN.</span>
                        </h1>
                        
                        <p className="text-zinc-400 text-lg md:text-xl max-w-xl leading-relaxed mb-10 font-light">
                            Reemplazamos la logística física por <span className="text-white font-medium">Infraestructura Digital</span>. 
                            High-Fidelity AI Production para marcas que entienden la imagen como un activo.
                        </p>

                        <div className="flex flex-col sm:flex-row gap-4">
                            <button className="px-8 py-4 bg-white text-black text-sm font-bold hover:bg-zinc-200 transition-colors">
                                EXPLORAR SISTEMA
                            </button>
                            <div className="flex items-center gap-4 px-6 py-4 border border-zinc-800 text-zinc-400 text-sm font-mono">
                                <div className="w-2 h-2 bg-brand-green rounded-full"></div>
                                <span>Virtual Studio: ONLINE</span>
                            </div>
                        </div>
                    </div>

                    {/* Columna Visual / Viewport (Derecha) */}
                    <div className="lg:col-span-5 relative mt-12 lg:mt-0">
                        {/* Marco Tecnológico "Placeholder" */}
                        <div className="relative aspect-[4/5] border border-zinc-800 bg-zinc-900/50 p-1">
                            
                            {/* Esquinas Técnicas */}
                            <div className="absolute top-0 left-0 w-4 h-4 border-l border-t border-brand-green"></div>
                            <div className="absolute top-0 right-0 w-4 h-4 border-r border-t border-brand-green"></div>
                            <div className="absolute bottom-0 left-0 w-4 h-4 border-l border-b border-brand-green"></div>
                            <div className="absolute bottom-0 right-0 w-4 h-4 border-r border-b border-brand-green"></div>

                            {/* Contenido Imagen: Referencia High Tech */}
                            <div className="w-full h-full relative overflow-hidden bg-black group">
                                <img 
                                    src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1080&auto=format&fit=crop" 
                                    alt="Digital Infrastructure" 
                                    className="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity duration-700 grayscale group-hover:grayscale-0"
                                />
                                {/* Overlay de Datos */}
                                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 mix-blend-overlay"></div>
                                
                                <div className="absolute top-4 left-4 font-mono text-[10px] text-brand-green">
                                    IMG_REF: SERVER_ARCH_01<br/>
                                    RES: 4K_UHD
                                </div>
                                <div className="absolute bottom-4 right-4 font-mono text-[10px] text-white text-right">
                                    RENDER_ENGINE: CYCLES<br/>
                                    STATUS: GENERATING...
                                </div>
                                
                                {/* Cruz central de mira */}
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center">
                                    <div className="w-full h-[1px] bg-white/20"></div>
                                    <div className="h-full w-[1px] bg-white/20 absolute"></div>
                                </div>
                            </div>
                        </div>
                        {/* Sombra de "glow" verde muy sutil detrás */}
                        <div className="absolute -inset-4 bg-brand-green/5 blur-3xl -z-10 rounded-full"></div>
                    </div>
                </div>
              </section>

              {/* === SECCIÓN 2: THE FILTER === */}
              <section id="filter" className="py-24 px-6 bg-zinc-950 text-white border-b border-zinc-900">
                <div className="max-w-7xl mx-auto">
                    <div className="grid md:grid-cols-12 gap-12">
                        <div className="md:col-span-4">
                             <span className="font-mono text-xs text-zinc-500 mb-4 block">01 / DIAGNOSIS</span>
                             <h2 className="text-4xl font-bold mb-6">IS THIS FOR YOU?</h2>
                             <p className="text-zinc-400 text-sm leading-relaxed">
                                Metodología "Post-Orgánica". Solo para marcas que buscan escalar su imagen como un activo financiero.
                             </p>
                        </div>
                        <div className="md:col-span-8 grid md:grid-cols-2 gap-px bg-zinc-900 border border-zinc-900">
                            {/* SI */}
                            <div className="bg-black p-8 relative overflow-hidden group">
                                <div className="absolute top-0 left-0 w-1 h-full bg-zinc-800 group-hover:bg-brand-green transition-colors"></div>
                                <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                    <Check className="text-brand-green" size={18}/> COMPATIBLE
                                </h3>
                                <ul className="space-y-4 text-sm text-zinc-400">
                                    <li className="flex gap-3"><span className="text-white font-mono">01.</span> Buscas percepción High-End/Lujo.</li>
                                    <li className="flex gap-3"><span className="text-white font-mono">02.</span> Necesitas coherencia visual absoluta.</li>
                                    <li className="flex gap-3"><span className="text-white font-mono">03.</span> Volumen alto de contenido vertical.</li>
                                </ul>
                            </div>
                            {/* NO */}
                            <div className="bg-black p-8 relative overflow-hidden group">
                                <div className="absolute top-0 left-0 w-1 h-full bg-zinc-800 group-hover:bg-red-500 transition-colors"></div>
                                <h3 className="text-lg font-bold mb-6 flex items-center gap-2">
                                    <XIcon className="text-zinc-600 group-hover:text-red-500 transition-colors" size={18}/> INCOMPATIBLE
                                </h3>
                                <ul className="space-y-4 text-sm text-zinc-500">
                                    <li className="flex gap-3"><span className="font-mono">01.</span> Buscas "relleno" rápido sin estética.</li>
                                    <li className="flex gap-3"><span className="font-mono">02.</span> Estrategia basada en el precio más bajo.</li>
                                    <li className="flex gap-3"><span className="font-mono">03.</span> Fotografía literal sin dirección de arte.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
              </section>

              {/* === SECCIÓN 3: THE SYSTEM (WHITE LAB MODE) === */}
              <section id="system" className="py-24 px-6 bg-white text-black section-transition relative">
                <div className="max-w-7xl mx-auto">
                  
                  <div className="flex justify-between items-start mb-16 border-b border-zinc-200 pb-8">
                    <div>
                        <span className="font-mono text-xs text-brand-green font-bold mb-2 block">02 / ARCHITECTURE</span>
                        <h2 className="text-5xl font-bold tracking-tight">DIGITAL MUSE</h2>
                    </div>
                    <div className="hidden md:block text-right">
                        <div className="inline-block px-3 py-1 border border-zinc-200 text-xs font-mono text-zinc-500">
                            SYSTEM_STATUS: READY
                        </div>
                    </div>
                  </div>

                  {/* === VISUAL ASSET === */}
                  <div className="grid lg:grid-cols-2 gap-12 mb-20 items-center">
                    <div className="relative">
                        <div className="aspect-[3/4] bg-zinc-100 overflow-hidden relative">
                             <img 
                                src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80&w=2550&auto=format&fit=crop" 
                                alt="Musa Digital" 
                                className="w-full h-full object-cover filter grayscale contrast-125 hover:grayscale-0 transition-all duration-700"
                            />
                            {/* Etiqueta flotante */}
                            <div className="absolute bottom-4 right-4 bg-white px-4 py-2 text-xs font-mono border border-zinc-200 shadow-lg">
                                MODEL_ID: MUSA_V1
                            </div>
                        </div>
                        {/* Decoración tech */}
                        <div className="absolute -bottom-4 -left-4 w-24 h-24 border-l border-b border-black"></div>
                    </div>
                    
                    <div>
                        <p className="text-2xl font-light leading-tight mb-8">
                            No contratamos modelos.<br/>
                            <span className="font-serif italic text-4xl block mt-2">Las construimos.</span>
                        </p>
                        <p className="text-zinc-600 mb-8 max-w-md">
                            IA Generativa para diseñar una Modelo Virtual Exclusiva. Definimos piel, rasgos y estilo. Un rostro de marca siempre disponible.
                        </p>
                        
                        {/* Specs Mini Table */}
                        <div className="border-t border-zinc-200 pt-8">
                            <h4 className="font-mono text-xs font-bold mb-6 text-zinc-400">TECHNICAL SPECS</h4>
                            
                            <div className="grid grid-cols-2 gap-y-8 gap-x-4">
                                <div>
                                    <div className="flex items-center gap-2 mb-2 text-brand-green">
                                        <Aperture size={16}/> <span className="text-black font-bold text-sm">STILLS</span>
                                    </div>
                                    <ul className="text-xs font-mono text-zinc-500 space-y-1">
                                        <li>Output: High-Fidelity 4K</li>
                                        <li>DPI: 300 (Print Ready)</li>
                                        <li>Format: 4:5 / 9:16</li>
                                    </ul>
                                </div>
                                <div>
                                    <div className="flex items-center gap-2 mb-2 text-brand-green">
                                        <Layers size={16}/> <span className="text-black font-bold text-sm">MOTION</span>
                                    </div>
                                    <ul className="text-xs font-mono text-zinc-500 space-y-1">
                                        <li>Tech: Img-to-Video AI</li>
                                        <li>Loop: 5-8 seconds</li>
                                        <li>Format: .MP4 H.264</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* === SECCIÓN 4: TIMELINE === */}
              <section id="timeline" className="py-24 px-6 bg-zinc-950 text-white border-t border-zinc-900">
                <div className="max-w-7xl mx-auto">
                  <span className="font-mono text-xs text-zinc-600 mb-4 block">03 / EXECUTION</span>
                  <h2 className="text-3xl font-bold mb-16">WORKFLOW LINEAL</h2>

                  <div className="grid md:grid-cols-4 gap-6">
                      {[
                        { day: "01", title: "INPUT", desc: "Envío de muestras físicas y briefing." },
                        { day: "02", title: "GENESIS", desc: "Setup de Musa y Dirección de Arte." },
                        { day: "03", title: "PRODUCCIÓN", desc: "Virtual Shoot y generación de escenarios." },
                        { day: "04", title: "DELIVERY", desc: "Entrega de assets listos para publicar." }
                      ].map((step, i) => (
                        <div key={i} className="border-t border-zinc-800 pt-6 hover:border-brand-green transition-colors group">
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-2xl font-bold">{step.title}</span>
                                <span className="font-mono text-xs text-zinc-600 group-hover:text-brand-green">PHASE {step.day}</span>
                            </div>
                            <p className="text-sm text-zinc-400 leading-relaxed">{step.desc}</p>
                        </div>
                      ))}
                  </div>
                </div>
              </section>

              {/* === FOOTER === */}
              <footer className="py-24 px-6 bg-black text-white border-t border-zinc-900">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-end gap-12">
                    <div>
                        <h2 className="text-5xl md:text-7xl font-bold tracking-tighter mb-8 leading-[0.9]">
                            ENTER THE<br/><span className="text-brand-green">SYSTEM</span>
                        </h2>
                        <p className="text-zinc-500 max-w-sm mb-8">
                            Agenda una Discovery Call de 15 minutos para evaluar si tu marca califica.
                        </p>
                        <button className="px-8 py-4 bg-white text-black font-bold hover:bg-zinc-200 transition-colors flex items-center gap-3">
                            AGENDAR LLAMADA <ArrowRight size={18}/>
                        </button>
                    </div>
                    
                    <div className="text-right">
                        <div className="font-mono text-xs text-zinc-600 mb-2">LOCATION</div>
                        <div className="text-xl font-bold mb-8">SANTIAGO, CL</div>
                        <div className="font-mono text-xs text-zinc-600">
                            &copy; {new Date().getFullYear()} OPEN CLUB DESIGN<br/>
                            ALL RIGHTS RESERVED
                        </div>
                    </div>
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OCDLanding />);
    </script>
</body>
</html>
